name: Release

on:
  push:
    branches: [main]
    paths:
      - src/theme/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        uses: ietf-tools/semver-action@c90370b2958652d71c06a3484129a4d423a6d8a8 # v1.11.0
        with:
          token: ${{ github.token }}
          branch: main
          fallbackTag: v0.0.0
          patchAll: true
          noNewCommitBehavior: current
          noVersionBumpBehavior: current

      - name: Create and push tag
        if: steps.semver.outputs.bump != 'none'
        run: |
          git tag ${{ steps.semver.outputs.next }}
          git push origin ${{ steps.semver.outputs.next }}

      - name: Package theme archive
        if: steps.semver.outputs.bump != 'none'
        run: |
          VERSION="${{ steps.semver.outputs.nextStrict }}"
          PKG="lugano-planb-vite-theme"

          mkdir -p "release/${PKG}/assets"

          cp src/theme/index.js   "release/${PKG}/"
          cp src/theme/theme.css  "release/${PKG}/"
          cp src/theme/domain.js  "release/${PKG}/"
          cp src/theme/assets/front_hero_desktop_frame.jpg "release/${PKG}/assets/"

          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'lugano-planb-vite-theme',
              version: process.argv[1],
              type: 'module',
              description: 'Lugano Plan B Vite theme — drop-in stylesheet and header helpers.',
              exports: {
                '.': './index.js',
                './theme.css': './theme.css'
              }
            };
            fs.writeFileSync('release/${PKG}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${VERSION}"

          tar -czf "release/${PKG}-${VERSION}.tar.gz" -C release "${PKG}"

      - name: Create GitHub Release
        if: steps.semver.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.next }}
          files: release/*.tar.gz
          generate_release_notes: true
