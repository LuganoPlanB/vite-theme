name: Release

on:
  push:
    branches: [main]
    paths:
      - src/theme/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: main
          fallbackTag: 0.1.0
          noVersionBumpBehavior: patch

      - name: Create annotated tag
        run: |
          git tag -a "${{ steps.semver.outputs.next }}" -m "${{ steps.semver.outputs.next }}"
          git push origin "${{ steps.semver.outputs.next }}"

      - name: Package theme archive
        run: |
          VERSION="${{ steps.semver.outputs.nextStrict }}"
          PKG="lugano-planb-vite-theme"

          mkdir -p "release/${PKG}/assets"

          cp src/theme/index.js   "release/${PKG}/"
          cp src/theme/theme.css  "release/${PKG}/"
          cp src/theme/domain.js  "release/${PKG}/"
          cp src/theme/assets/front_hero_desktop_frame.jpg "release/${PKG}/assets/"

          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'lugano-planb-vite-theme',
              version: process.argv[1],
              type: 'module',
              description: 'Lugano Plan B Vite theme — drop-in stylesheet and header helpers.',
              exports: {
                '.': './index.js',
                './theme.css': './theme.css'
              }
            };
            fs.writeFileSync('release/${PKG}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${VERSION}"

          tar -czf "release/${PKG}-${VERSION}.tar.gz" -C release "${PKG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.semver.outputs.next }}
          files: release/*.tar.gz
          generate_release_notes: true
