name: Release

on:
  push:
    branches: [main]
    paths:
      - src/theme/**
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump level
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump || 'patch' }}
          release_branches: main
          create_annotated_tag: true

      - name: Package theme archive
        run: |
          VERSION="${{ steps.tag.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          PKG="lugano-planb-vite-theme"

          mkdir -p "release/${PKG}/assets"

          cp src/theme/index.js   "release/${PKG}/"
          cp src/theme/theme.css  "release/${PKG}/"
          cp src/theme/domain.js  "release/${PKG}/"
          cp src/theme/assets/front_hero_desktop_frame.jpg "release/${PKG}/assets/"

          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'lugano-planb-vite-theme',
              version: process.argv[1],
              type: 'module',
              description: 'Lugano Plan B Vite theme — drop-in stylesheet and header helpers.',
              exports: {
                '.': './index.js',
                './theme.css': './theme.css'
              }
            };
            fs.writeFileSync('release/${PKG}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${VERSION}"

          tar -czf "release/${PKG}-${VERSION}.tar.gz" -C release "${PKG}"

      - name: Attach archive to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          files: release/*.tar.gz
