name: Release

on:
  push:
    branches: [main]
    paths:
      - src/theme/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Bootstrap first tag if none exist
        id: bootstrap
        run: |
          if git describe --tags --abbrev=0 2>/dev/null; then
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a v0.1.0 -m "v0.1.0"
            git push origin v0.1.0
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        if: steps.bootstrap.outputs.bootstrapped != 'true'
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: main
          noVersionBumpBehavior: patch

      - name: Set release version
        id: version
        run: |
          if [ "${{ steps.bootstrap.outputs.bootstrapped }}" = "true" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "number=0.1.0" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.semver.outputs.next }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ steps.semver.outputs.nextStrict }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated tag
        if: steps.bootstrap.outputs.bootstrapped != 'true'
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Package theme archive
        run: |
          VERSION="${{ steps.version.outputs.number }}"
          PKG="lugano-planb-vite-theme"

          mkdir -p "release/${PKG}/assets"

          cp src/theme/index.js   "release/${PKG}/"
          cp src/theme/theme.css  "release/${PKG}/"
          cp src/theme/domain.js  "release/${PKG}/"
          cp src/theme/assets/front_hero_desktop_frame.jpg "release/${PKG}/assets/"

          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'lugano-planb-vite-theme',
              version: process.argv[1],
              type: 'module',
              description: 'Lugano Plan B Vite theme — drop-in stylesheet and header helpers.',
              exports: {
                '.': './index.js',
                './theme.css': './theme.css'
              }
            };
            fs.writeFileSync('release/${PKG}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${VERSION}"

          tar -czf "release/${PKG}-${VERSION}.tar.gz" -C release "${PKG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release/*.tar.gz
          generate_release_notes: true
